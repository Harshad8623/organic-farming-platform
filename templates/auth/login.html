{% extends "base.html" %}
{% block title %}Login — KrishiAI{% endblock %}

{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">

      <div class="card shadow-sm">
        <div class="card-header bg-success text-white text-center py-3">
          <h4 class="mb-0"><i class="bi bi-box-arrow-in-right me-2"></i>Login</h4>
          <small>Welcome back to KrishiAI</small>
        </div>
        <div class="card-body p-4">

          <form method="POST" action="{{ url_for('auth.login') }}">

            <div class="mb-3">
              <label for="email" class="form-label">Email Address</label>
              <input type="email" class="form-control" id="email" name="email"
                     placeholder="you@example.com" required autofocus />
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password"
                     name="password" placeholder="Your password" required />
            </div>

            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="remember" name="remember" />
              <label class="form-check-label" for="remember">Remember me</label>
            </div>

            <button type="submit" class="btn btn-success w-100">
              <i class="bi bi-box-arrow-in-right me-1"></i>Login
            </button>
          </form>

          <hr />
          <p class="text-center mb-0">
            New here?
            <a href="{{ url_for('auth.register') }}" class="text-success fw-semibold">Create Account</a>
          </p>
        </div>
      </div>

      <!-- Help box -->
      <div class="alert alert-info mt-3">
        <i class="bi bi-info-circle me-1"></i>
        <strong>Default test accounts:</strong><br />
        Farmer: <code>farmer@test.com</code> / <code>123456</code><br />
        Buyer: <code>buyer@test.com</code> / <code>123456</code>
      </div>

    </div>
  </div>
</div>
{% endblock %}
